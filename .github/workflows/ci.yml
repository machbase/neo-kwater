name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  release:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/kwater-linux-amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist/kwater-darwin-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist/kwater-windows-amd64.exe .

      - name: Package release zip
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          zip -j "neo-kwater-${tag}.zip" README.md dist/kwater-linux-amd64 dist/kwater-darwin-arm64 dist/kwater-windows-amd64.exe

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: neo-kwater-${{ github.ref_name }}
          path: neo-kwater-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: neo-kwater-${{ github.ref_name }}.zip